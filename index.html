<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AKKU & HANIA Couple Goal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>AKKU & HANIA – Couple Goals</h1>
    <p>A beautiful journey of love and togetherness</p>
  </header>

  <section class="gallery">
    <div class="image-container">
      <img src="image-couple-kiss.jpg" alt="Akku and Hania couple" />
      <div class="label left">HANIA</div>
      <div class="label right">AKKU</div>
    </div>
    <div class="image-container">
      <img src="image-family-cartoon.jpg" alt="Akku and Hania with baby cartoon" />
    </div>
  </section>

  <section class="about">
    <h2>About Us</h2>
    <p>Welcome to our love story! We are Akku and Hania, sharing our journey, dreams, and moments together as a family.</p>
  </section>

  <section class="contact">
    <h2>Contact Us</h2>
    <form>
      <input type="text" placeholder="Your name" required />
      <input type="email" placeholder="Email" required />
      <textarea placeholder="Your message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2024 AKKU & HANIA. All rights reserved.</p>
  </footer>
</body>
</html>
